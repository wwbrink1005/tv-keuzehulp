<!DOCTYPE html>
<html lang="nl">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Resultaat - TV Keuzehulp</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="menu.css" />
		<link rel="stylesheet" href="footer.css" />
		<script src="https://unpkg.com/lucide@latest"></script>
		<script src="menu.js" defer></script>
		<script src="footer.js" defer></script>
		<style>
			/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
			   DESIGN TOKENS
			   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
			:root {
				--page-bg: #f5f5f7;
				--card-bg: #ffffff;
				--accent: #0954a3;
				--accent-soft: rgba(9, 84, 163, 0.08);
				--accent-glow: rgba(9, 84, 163, 0.14);
				--muted: #86868b;
				--text-primary: #1d1d1f;
				--text-secondary: #424245;
				--text-tertiary: #86868b;
				--line: #e8eaed;
				--container-max: 1100px;
				--filter-width: 230px;
				--filter-gap: 28px;
				--container-padding: clamp(16px, 4vw, 48px);
				--radius-sm: 10px;
				--radius-md: 14px;
				--radius-lg: 20px;
				--radius-xl: 24px;
				--shadow-card: 0 2px 12px rgba(0, 0, 0, 0.06);
				--shadow-card-hover: 0 8px 30px rgba(9, 84, 163, 0.12);
				--shadow-elevated: 0 12px 40px rgba(0, 0, 0, 0.1);
				--transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
			}

			/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
			   RESET & BASE
			   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			html {
				scroll-behavior: smooth;
				-webkit-font-smoothing: antialiased;
				-moz-osx-font-smoothing: grayscale;
			}

			body {
				font-family: "Inter", sans-serif;
				background: var(--page-bg);
				color: var(--text-primary);
			}

			/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
			   ANIMATIONS
			   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
			@keyframes fadeUp {
				from {
					opacity: 0;
					transform: translateY(16px);
				}
				to {
					opacity: 1;
					transform: translateY(0);
				}
			}

			@keyframes fadeIn {
				from { opacity: 0; }
				to { opacity: 1; }
			}

			/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
			   TITLE BAR
			   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
			.title-bar {
				width: 100%;
				background: var(--page-bg);
				display: flex;
				align-items: center;
				justify-content: center;
				padding: 28px 50px 20px;
				position: relative;
				animation: fadeIn 0.5s ease-out;
			}

			.restart-link {
				position: absolute;
				left: 50px;
				bottom: 20px;
				display: inline-flex;
				align-items: center;
				gap: 8px;
				padding: 9px 18px;
				border-radius: 999px;
				background: var(--card-bg);
				border: 1px solid var(--line);
				font-size: 14px;
				font-weight: 500;
				color: var(--text-secondary);
				text-decoration: none;
				transition: all var(--transition);
			}

			.restart-link:visited {
				color: var(--text-secondary);
			}

			.restart-link:hover {
				color: var(--accent);
				border-color: var(--accent);
				box-shadow: 0 2px 8px var(--accent-soft);
			}

			.restart-link svg {
				width: 14px;
				height: 14px;
			}

			.result-title {
				font-size: 22px;
				font-weight: 600;
				color: var(--text-primary);
				text-align: center;
				letter-spacing: -0.02em;
				line-height: 1.3;
			}

			.result-count {
				color: var(--muted);
				font-weight: 500;
				font-size: 18px;
				margin-left: 0.25em;
			}

			#resultTitleText::after {
				content: "";
			}

			/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
			   RESULTS LAYOUT
			   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
			.results-section {
				width: 100%;
				margin: 0 auto;
				background: var(--page-bg);
				padding: 0 50px var(--container-padding);
			}

			.results-layout {
				width: 100%;
				max-width: none;
				margin: 0;
				display: grid;
				grid-template-columns: var(--filter-width) minmax(0, 1fr);
				gap: var(--filter-gap);
				align-items: start;
			}

			.results-content {
				width: 100%;
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: clamp(1.25rem, 3vw, 2rem);
			}

			/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
			   SORT TOOLBAR
			   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
			.results-toolbar {
				position: absolute;
				right: 50px;
				bottom: 20px;
				display: flex;
				align-items: center;
			}

			.sort-control {
				display: inline-flex;
				align-items: center;
				gap: 8px;
				font-family: "Inter", sans-serif;
			}

			.sort-select {
				position: relative;
				display: inline-flex;
			}

			.sort-label {
				font-size: 14px;
				font-weight: 400;
				color: var(--text-tertiary);
			}

			.sort-button {
				display: inline-flex;
				align-items: center;
				gap: 8px;
				height: 34px;
				padding: 0 14px;
				border: 1px solid var(--line);
				border-radius: 999px;
				background: var(--card-bg);
				color: var(--text-primary);
				font-size: 13px;
				font-weight: 500;
				font-family: "Inter", sans-serif;
				cursor: pointer;
				transition: all var(--transition);
			}

			.sort-button:hover {
				border-color: var(--accent);
				color: var(--accent);
			}

			.sort-button svg {
				width: 13px;
				height: 13px;
				color: var(--accent);
			}

			.sort-menu {
				position: absolute;
				left: 0;
				top: calc(100% + 6px);
				width: 100%;
				display: none;
				flex-direction: column;
				background: var(--card-bg);
				border: 1px solid var(--line);
				border-radius: var(--radius-md);
				box-shadow: var(--shadow-elevated);
				z-index: 4;
				overflow: hidden;
			}

			.sort-control.is-open .sort-menu {
				display: flex;
			}

			.sort-option {
				border: none;
				background: transparent;
				text-align: left;
				padding: 8px 14px;
				font-family: "Inter", sans-serif;
				font-size: 13px;
				font-weight: 500;
				color: var(--text-secondary);
				cursor: pointer;
				transition: all 0.15s ease;
			}

			.sort-option:hover {
				background: var(--accent-soft);
				color: var(--accent);
			}

			.sort-option.is-selected {
				color: var(--accent);
				font-weight: 600;
			}

			/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
			   FILTERS PANEL
			   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
			.filters-panel {
				width: 100%;
				display: flex;
				flex-direction: column;
				gap: 14px;
				position: sticky;
				top: calc(var(--menu-height, 64px) + 16px);
			}

			.filter-cta {
				display: inline-flex;
				align-items: center;
				gap: 10px;
				background: var(--accent);
				color: #ffffff;
				border: none;
				border-radius: var(--radius-md);
				padding: 12px 16px;
				font-size: 14px;
				font-weight: 600;
				cursor: pointer;
				transition: all var(--transition);
			}

			.filter-cta:hover {
				background: #073d7a;
			}

			.filter-cta svg {
				width: 16px;
				height: 16px;
			}

			.filter-card {
				background: var(--card-bg);
				border-radius: var(--radius-lg);
				border: 1px solid var(--line);
				padding: 16px 18px 20px;
				display: flex;
				flex-direction: column;
				gap: 14px;
				transition: box-shadow var(--transition);
			}

			.filter-card:hover {
				box-shadow: var(--shadow-card);
			}

			.filter-title {
				font-size: 13px;
				font-weight: 600;
				color: var(--text-primary);
				text-transform: uppercase;
				letter-spacing: 0.04em;
			}

			.filter-options {
				display: flex;
				flex-direction: column;
				gap: 10px;
				align-items: flex-start;
			}

			.filter-option {
				display: flex;
				align-items: center;
				gap: 10px;
				font-size: 14px;
				font-weight: 500;
				color: var(--text-secondary);
				cursor: pointer;
				transition: color 0.15s ease;
			}

			.filter-option:hover {
				color: var(--text-primary);
			}

			.filter-option input[type="radio"],
			.filter-option input[type="checkbox"] {
				width: 18px;
				height: 18px;
				border: 1.5px solid #c4c7cc;
				border-radius: 50%;
				appearance: none;
				background: var(--card-bg);
				cursor: pointer;
				flex-shrink: 0;
				margin: 0;
				transition: all 0.2s ease;
			}

			.filter-option input[type="radio"]:checked,
			.filter-option input[type="checkbox"]:checked {
				background: var(--accent);
				border-color: var(--accent);
				box-shadow: inset 0 0 0 2.5px #ffffff;
			}

			/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
			   MOBILE ACTIONS
			   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
			.mobile-actions {
				display: none;
				align-items: center;
				gap: 8px;
			}

			.icon-button {
				width: 36px;
				height: 36px;
				border-radius: var(--radius-sm);
				border: 1px solid var(--line);
				background: var(--card-bg);
				display: inline-flex;
				align-items: center;
				justify-content: center;
				color: var(--text-secondary);
				cursor: pointer;
				transition: all var(--transition);
			}

			.icon-button:hover {
				color: var(--accent);
				border-color: var(--accent);
			}

			.icon-button svg {
				width: 16px;
				height: 16px;
			}

			.restart-toggle {
				position: relative;
			}

			.restart-popover {
				position: absolute;
				top: calc(100% + 8px);
				left: 0;
				min-width: 150px;
				background: var(--card-bg);
				border-radius: var(--radius-md);
				border: 1px solid var(--line);
				box-shadow: var(--shadow-elevated);
				padding: 8px;
				display: none;
				z-index: 20;
			}

			.restart-popover.is-open {
				display: block;
			}

			.restart-confirm {
				width: 100%;
				border: none;
				border-radius: 999px;
				padding: 9px 14px;
				background: var(--accent);
				color: #ffffff;
				font-size: 13px;
				font-weight: 600;
				cursor: pointer;
				transition: background 0.2s ease;
			}

			.restart-confirm:hover {
				background: #073d7a;
			}

			.filter-drawer-close {
				display: none;
				align-self: flex-end;
				width: 36px;
				height: 36px;
				border-radius: var(--radius-sm);
				border: 1px solid var(--line);
				background: var(--card-bg);
				cursor: pointer;
				align-items: center;
				justify-content: center;
				color: var(--accent);
				transition: all var(--transition);
			}

			.filter-drawer-close:hover {
				background: var(--accent-soft);
			}

			.filter-drawer-close svg {
				width: 16px;
				height: 16px;
			}

			/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
			   BEST MATCH CARD
			   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
			.best-match-card {
				width: 100%;
				max-width: var(--container-max);
				background: var(--card-bg);
				border-radius: var(--radius-xl);
				border: 1px solid var(--line);
				display: flex;
				flex-direction: column;
				padding: 0 clamp(1.5rem, 5vw, 4rem) clamp(1.25rem, 3vw, 1.75rem);
				position: relative;
				transition: transform var(--transition), opacity var(--transition), box-shadow var(--transition);
				animation: fadeUp 0.5s ease-out;
			}

			.best-match-card:hover {
				box-shadow: var(--shadow-card-hover);
			}

			.best-match-card.inline {
				width: 100%;
				max-width: var(--container-max);
				grid-column: 1 / -1;
				margin: 0 auto clamp(0.25rem, 1vw, 0.5rem);
			}

			.best-match-card.is-opening {
				transform: translateY(8px);
				opacity: 0.9;
			}

			.best-match-card.is-hidden {
				display: none;
			}

			.best-match-row {
				display: flex;
				flex-direction: column;
				gap: clamp(1.25rem, 3vw, 2rem);
				align-items: center;
				margin-top: clamp(1.5rem, 4vw, 2.5rem);
			}

			.best-match-close {
				position: absolute;
				top: 16px;
				right: 16px;
				width: 32px;
				height: 32px;
				border: none;
				border-radius: 999px;
				background: var(--page-bg);
				color: var(--text-tertiary);
				display: inline-flex;
				align-items: center;
				justify-content: center;
				cursor: pointer;
				transition: all var(--transition);
			}

			.best-match-close:hover {
				background: #e8e8ec;
				color: var(--text-primary);
			}

			.best-match-close svg {
				width: 14px;
				height: 14px;
			}

			.best-match-media {
				width: 100%;
				max-width: clamp(14rem, 50vw, 24rem);
				display: flex;
				align-items: center;
				justify-content: center;
				margin-top: clamp(0.5rem, 2vw, 1rem);
			}

			.best-match-media img {
				width: 100%;
				height: auto;
				max-width: 100%;
				object-fit: contain;
				display: block;
			}

			.best-match-body {
				flex: 1;
				display: flex;
				flex-direction: column;
				gap: 0;
			}

			.best-match-name {
				font-size: 20px;
				font-weight: 700;
				color: var(--text-primary);
				letter-spacing: -0.01em;
				margin: 0;
			}

			.best-match-points {
				list-style: none;
				display: flex;
				flex-direction: column;
				gap: 10px;
				font-size: 14px;
				color: var(--text-secondary);
				margin-top: 16px;
				max-width: 26rem;
			}

			.best-match-points li {
				display: flex;
				align-items: flex-start;
				gap: 8px;
				line-height: 1.45;
			}

			.best-match-check {
				width: 16px;
				height: 16px;
				color: var(--accent);
				flex-shrink: 0;
				margin-top: 2px;
			}

			.best-match-specs {
				font-size: 13px;
				color: var(--text-tertiary);
				margin-top: clamp(0.75rem, 2vw, 1rem);
				letter-spacing: 0.01em;
			}

			.best-match-price {
				font-size: 22px;
				font-weight: 700;
				color: var(--text-primary);
				margin-top: clamp(0.75rem, 2vw, 1rem);
				letter-spacing: -0.02em;
			}

			.best-match-divider {
				display: none;
			}

			.best-match-footer {
				height: 0;
			}

			/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
			   OTHER MATCH CARDS
			   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
			.other-matches {
				width: 100%;
				display: flex;
				justify-content: center;
			}

			.other-matches-grid {
				display: grid;
				grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
				gap: clamp(0.75rem, 2vw, 1rem);
				width: 100%;
				max-width: var(--container-max);
			}

			.other-match-card {
				width: 100%;
				background: var(--card-bg);
				border-radius: var(--radius-lg);
				border: 2px solid transparent;
				padding: clamp(1.1rem, 2.5vw, 1.5rem);
				display: flex;
				flex-direction: column;
				gap: clamp(0.4rem, 1.2vw, 0.6rem);
				align-items: flex-start;
				text-align: left;
				cursor: pointer;
				transition: all var(--transition);
				animation: fadeUp 0.4s ease-out backwards;
			}

			.other-match-card:nth-child(1) { animation-delay: 0s; }
			.other-match-card:nth-child(2) { animation-delay: 0.04s; }
			.other-match-card:nth-child(3) { animation-delay: 0.08s; }
			.other-match-card:nth-child(4) { animation-delay: 0.12s; }
			.other-match-card:nth-child(5) { animation-delay: 0.16s; }
			.other-match-card:nth-child(6) { animation-delay: 0.2s; }

			.other-match-card:hover {
				border-color: var(--line);
				box-shadow: var(--shadow-card);
				transform: translateY(-2px);
			}

			.other-match-card.is-active {
				border-color: var(--accent);
				box-shadow: 0 4px 20px var(--accent-glow), 0 0 0 3px var(--accent-soft);
				transform: translateY(-3px);
			}

			.other-match-card.is-active .other-match-title {
				color: var(--accent);
			}

			.other-match-title {
				font-size: 15px;
				line-height: 1.3;
				font-weight: 600;
				color: var(--text-primary);
				margin: 0;
				letter-spacing: -0.01em;
			}

			.other-match-media {
				width: 100%;
				display: flex;
				justify-content: center;
				padding: 8px 0;
			}

			.other-match-media img {
				width: clamp(9rem, 48vw, 11rem);
				height: auto;
				max-width: 100%;
				object-fit: contain;
				display: block;
			}

			.other-match-price {
				font-size: 16px;
				font-weight: 700;
				color: var(--text-primary);
				letter-spacing: -0.01em;
			}

			.other-match-specs {
				list-style: none;
				display: flex;
				flex-wrap: wrap;
				gap: 0.2rem 0;
				font-size: 12px;
				color: var(--text-tertiary);
			}

			.other-match-specs li {
				display: flex;
				align-items: center;
				gap: 0;
			}

			.other-match-specs li::after {
				content: "\00b7";
				color: #c4c7cc;
				margin: 0 0.4rem;
				font-weight: 700;
			}

			.other-match-specs li:last-child::after {
				content: "";
				margin: 0;
			}

			.other-match-action {
				background: var(--accent-soft);
				border: none;
				color: var(--accent);
				font-size: 13px;
				font-weight: 600;
				display: inline-flex;
				align-items: center;
				justify-content: center;
				padding: 8px 28px;
				border-radius: 999px;
				cursor: pointer;
				margin-top: auto;
				align-self: center;
				transition: all var(--transition);
			}

			.other-match-action:hover {
				background: var(--accent);
				color: #ffffff;
			}

			.other-match-action svg {
				width: 18px;
				height: 18px;
			}

			.no-matches {
				font-size: 14px;
				color: var(--text-tertiary);
				text-align: center;
				padding: 2rem 0;
			}

			/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
			   RESPONSIVE — TABLET (≤1200px)
			   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
			@media (max-width: 1200px) {
				.title-bar {
					display: grid;
					grid-template-columns: 1fr auto;
					grid-template-rows: auto auto;
					align-items: center;
					gap: 0.5rem 1rem;
					padding: 20px 24px 16px;
				}

				.restart-link,
				.results-toolbar {
					position: static;
				}

				.restart-link {
					grid-column: 1;
					grid-row: 1;
					justify-self: start;
				}

				.result-title {
					grid-column: 1 / -1;
					grid-row: 2;
					max-width: 36rem;
					line-height: 1.3;
					justify-self: center;
				}

				.results-toolbar {
					grid-column: 2;
					grid-row: 1;
					justify-self: end;
				}
			}

			/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
			   RESPONSIVE — LARGE CARDS (≥900px)
			   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
			@media (min-width: 900px) {
				.best-match-row {
					flex-direction: row-reverse;
					align-items: flex-start;
				}

				.other-match-media img {
					width: clamp(9.5rem, 16vw, 11rem);
				}
			}

			/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
			   RESPONSIVE — MOBILE-TABLET (≤900px)
			   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
			@media (max-width: 900px) {
				.title-bar {
					display: grid;
					grid-template-columns: 1fr auto;
					grid-template-rows: auto auto;
					align-items: center;
					gap: 0.5rem 1rem;
					padding: 16px 20px 14px;
				}

				.restart-link,
				.results-toolbar {
					position: static;
				}

				.restart-link {
					grid-column: 1;
					grid-row: 1;
					justify-self: start;
				}

				.result-title {
					grid-column: 1 / -1;
					grid-row: 2;
					font-size: 20px;
					justify-self: center;
				}

				.results-toolbar {
					grid-column: 2;
					grid-row: 1;
					justify-self: end;
				}

				.best-match-card {
					animation: fadeUp 0.4s ease-out;
				}

				.other-match-card {
					animation: fadeUp 0.35s ease-out;
				}
			}

			/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
			   RESPONSIVE — MOBILE (≤700px)
			   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
			@media (max-width: 700px) {
				.title-bar {
					display: grid;
					grid-template-columns: 1fr auto;
					grid-template-rows: auto auto;
					align-items: center;
					gap: 0.6rem 0.9rem;
					padding: 12px 16px 12px;
				}

				.mobile-actions {
					display: flex;
					grid-column: 1;
					grid-row: 1;
					justify-self: start;
				}

				.restart-link {
					display: none;
				}

				.results-toolbar {
					position: static;
					grid-column: 2;
					grid-row: 1;
					justify-self: end;
					margin: 0;
				}

				.result-title {
					grid-column: 1 / -1;
					grid-row: 2;
					font-size: clamp(1.1rem, 4.5vw, 1.35rem);
					text-align: center;
				}

				.results-section {
					padding-left: 16px;
					padding-right: 16px;
				}

				.results-layout {
					display: block;
					gap: 0;
				}

				/* Filter drawer */
				.filters-panel {
					position: fixed;
					top: var(--menu-height, 64px);
					left: 0;
					bottom: 0;
					width: min(78vw, 280px);
					background: var(--page-bg);
					padding: 16px 14px 24px;
					box-shadow: 10px 0 30px rgba(0, 0, 0, 0.12);
					transform: translateX(-105%);
					transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
					z-index: 900;
					overflow-y: auto;
				}

				.filters-panel.is-open {
					transform: translateX(0);
				}

				.filter-drawer-close {
					display: inline-flex;
				}

				.filter-cta {
					width: 100%;
					justify-content: flex-start;
				}

				/* Best match mobile */
				.best-match-card {
					padding: 1.25rem 1.1rem 1.5rem;
					border-radius: var(--radius-xl);
				}

				.best-match-row,
				.best-match-body {
					align-items: center;
					text-align: center;
				}

				.best-match-media {
					max-width: 380px;
					margin-left: auto;
					margin-right: auto;
				}

				.best-match-name {
					font-size: clamp(1rem, 4vw, 1.2rem);
				}

				.best-match-price {
					font-size: clamp(1.2rem, 4.5vw, 1.4rem);
					text-align: center;
				}

				.best-match-points {
					display: grid;
					grid-template-columns: 1fr 1fr;
					gap: 0.5rem 0.75rem;
					max-width: 480px;
					text-align: left;
					margin-left: auto;
					margin-right: auto;
				}

				.best-match-points li {
					align-items: flex-start;
				}

				/* Other match cards mobile */
				.other-match-card {
					padding: 1rem 1.1rem;
					gap: 0.45rem;
				}

				.other-match-media img {
					width: clamp(8.5rem, 50vw, 10.5rem);
				}

				.other-match-action {
					width: min(65%, 200px);
				}
			}

			/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
			   RESPONSIVE — SMALL MOBILE (≤520px)
			   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
			@media (max-width: 520px) {
				.result-title {
					gap: 0.4rem;
					max-width: 18rem;
				}

				.best-match-points {
					grid-template-columns: 1fr;
					max-width: 300px;
				}

				.other-matches-grid {
					grid-template-columns: 1fr;
				}

				.sort-label {
					display: none;
				}

				.other-match-media img {
					width: clamp(8rem, 60vw, 9.5rem);
				}
			}

			/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
			   RESPONSIVE — TINY MOBILE (≤400px)
			   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
			@media (max-width: 400px) {
				.title-bar {
					padding: 10px 12px 10px;
				}

				.best-match-name {
					font-size: 1rem;
				}

				.best-match-price {
					font-size: 1.25rem;
				}

				.other-match-title {
					font-size: 14px;
				}

				.other-match-card {
					border-radius: var(--radius-lg);
				}
			}
		</style>
	</head>
	<body>
		<!-- ── Title Bar ── -->
		<div class="title-bar">
			<div class="mobile-actions" aria-label="Snelle acties">
				<button class="icon-button filter-toggle" type="button" aria-label="Open filters" aria-expanded="false" aria-controls="filtersPanel">
					<i data-lucide="sliders-horizontal"></i>
				</button>
				<div class="restart-toggle">
					<button class="icon-button restart-trigger" type="button" aria-label="Begin opnieuw" aria-expanded="false" aria-controls="restartPopover">
						<i data-lucide="rotate-ccw"></i>
					</button>
					<div id="restartPopover" class="restart-popover" role="dialog" aria-hidden="true">
						<button class="restart-confirm" type="button">Begin opnieuw</button>
					</div>
				</div>
			</div>

			<a class="restart-link" href="vragen.html">
				<i data-lucide="arrow-left"></i>
				<span>Opnieuw beginnen</span>
			</a>

			<h1 id="resultTitle" class="result-title">
				<span id="resultTitleText">De tv die het beste bij je keuzes past!</span>
				<span id="resultMatchCount" class="result-count">(0)</span>
			</h1>

			<div class="results-toolbar">
				<div id="sortControl" class="sort-control">
					<span class="sort-label">Sorteer:</span>
					<div class="sort-select">
						<button id="sortButton" class="sort-button" type="button" aria-haspopup="listbox" aria-expanded="false">
							<span id="sortButtonText">Prijs (laag-hoog)</span>
							<i data-lucide="chevrons-up-down"></i>
						</button>
						<div id="sortMenu" class="sort-menu" role="listbox" aria-hidden="true">
							<button class="sort-option is-selected" type="button" role="option" aria-selected="true" data-value="price-asc">Prijs (laag-hoog)</button>
							<button class="sort-option" type="button" role="option" aria-selected="false" data-value="price-desc">Prijs (hoog-laag)</button>
						</div>
					</div>
				</div>
			</div>
		</div>

		<!-- ── Main Results ── -->
		<main class="results-section">
			<div class="results-layout">
				<!-- Filters Sidebar -->
				<aside id="filtersPanel" class="filters-panel" aria-label="Filters">
					<button class="filter-drawer-close" type="button" aria-label="Sluit filters">
						<i data-lucide="chevron-left"></i>
					</button>
					<button class="filter-cta" type="button">
						<i data-lucide="sliders-horizontal"></i>
						<span>Extra filters</span>
					</button>
					<div class="filter-card" data-filter="price">
						<h3 class="filter-title">Prijscategorie</h3>
						<div id="priceFilterOptions" class="filter-options"></div>
					</div>
					<div class="filter-card" data-filter="brand">
						<h3 class="filter-title">Merk</h3>
						<div id="brandFilterOptions" class="filter-options"></div>
					</div>
				</aside>

				<!-- Results Content -->
				<div class="results-content">
					<!-- Best Match Detail Card -->
					<section id="bestMatchCard" class="best-match-card">
						<button class="best-match-close" type="button" aria-label="Sluit">
							<i data-lucide="x"></i>
						</button>
						<div class="best-match-row">
							<div class="best-match-media" aria-hidden="true">
								<img src="tv.png" alt="" role="presentation" />
							</div>
							<div class="best-match-body">
								<h2 id="bestMatchName" class="best-match-name"></h2>
								<ul id="bestMatchPoints" class="best-match-points"></ul>
								<div id="bestMatchSpecs" class="best-match-specs"></div>
								<div id="bestMatchPrice" class="best-match-price"></div>
							</div>
						</div>
						<div class="best-match-divider" aria-hidden="true"></div>
						<div class="best-match-footer"></div>
					</section>

					<!-- TV Grid -->
					<section class="other-matches">
						<div id="otherMatchesGrid" class="other-matches-grid"></div>
					</section>
				</div>
			</div>
		</main>

		<script src="result-ui.js" defer></script>
		<script type="module" src="result-filters.js"></script>
		<script type="module" src="main.js"></script>
	</body>
</html>
