<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resultaat — producthulp.nl</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="menu.css" />
    <link rel="stylesheet" href="footer.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="menu.js" defer></script>
    <script src="footer.js" defer></script>

    <style>
      /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         DESIGN TOKENS  (matched to homepage redesign)
         ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
      :root {
        --color-primary: #0954a3;
        --color-primary-light: #e8f0fe;
        --color-primary-dark: #073d7a;
        --color-text: #0a0a1a;
        --color-text-secondary: #64748b;
        --color-bg: #f8f9fc;
        --color-white: #ffffff;
        --color-border: #e8eaed;
        --card-shadow: 0 4px 20px rgba(9, 84, 163, 0.06);
        --card-shadow-hover: 0 12px 36px rgba(9, 84, 163, 0.12);
        --radius-sm: 12px;
        --radius-md: 16px;
        --radius-lg: 24px;
        --radius-full: 999px;
        --font-heading: "Inter", sans-serif;
        --font-body: "Inter", sans-serif;
        --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        --container-max: 1100px;
        --layout-max: 1280px;
        --filter-width: 240px;
        --filter-gap: 32px;
        --page-padding: clamp(16px, 4vw, 48px);

        /* legacy aliases for JS compatibility */
        --page-bg: var(--color-bg);
        --card-bg: var(--color-white);
        --accent: var(--color-primary);
        --muted: var(--color-text-secondary);
        --line: var(--color-border);
        --sort-text: var(--color-text);
        --filter-card-min-height: 0px;
      }

      /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         RESET & BASE
         ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        scroll-behavior: smooth;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body {
        font-family: var(--font-body);
        background: var(--color-bg);
        color: var(--color-text);
        overflow-x: hidden;
      }

      /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         TITLE BAR
         ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
      .title-bar {
        width: 100%;
        background: linear-gradient(168deg, #f8f9fc 0%, #eef2f9 60%, #e4ecf7 100%);
        display: flex;
        align-items: flex-end;
        justify-content: center;
        padding: 0 clamp(20px, 4vw, 50px) 20px;
        position: relative;
        min-height: 90px;
        border-bottom: 1px solid var(--color-border);
      }

      .restart-link {
        position: absolute;
        left: clamp(20px, 4vw, 50px);
        bottom: 18px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 9px 18px;
        border-radius: var(--radius-full);
        background: var(--color-white);
        border: 1px solid var(--color-border);
        box-shadow: var(--card-shadow);
        font-size: 14px;
        font-weight: 500;
        color: var(--color-text);
        text-decoration: none;
        transition: box-shadow var(--transition), transform 0.15s ease;
      }

      .restart-link:visited {
        color: var(--color-text);
      }

      .restart-link:hover {
        box-shadow: var(--card-shadow-hover);
        transform: translateY(-1px);
      }

      .restart-link svg {
        width: 15px;
        height: 15px;
        color: var(--color-primary);
      }

      .result-title {
        font-family: var(--font-heading);
        font-size: clamp(20px, 3vw, 28px);
        font-weight: 700;
        color: var(--color-text);
        text-align: center;
        letter-spacing: -0.02em;
        line-height: 1.3;
      }

      .result-count {
        color: var(--color-primary);
        font-weight: 600;
        margin-left: 1px;
        white-space: nowrap;
      }

      #resultTitleText::after {
        content: "\00a0";
      }

      /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         RESULTS SECTION
         ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
      .results-section {
        width: 100%;
        margin: 0 auto;
        background: var(--color-bg);
        padding: var(--page-padding);
        padding-left: clamp(20px, 4vw, 50px);
        padding-right: clamp(20px, 4vw, 50px);
      }

      .results-layout {
        width: 100%;
        max-width: none;
        margin: 0;
        display: grid;
        grid-template-columns: var(--filter-width) minmax(0, 1fr);
        gap: var(--filter-gap);
        align-items: start;
      }

      .results-content {
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: clamp(1.5rem, 3vw, 2.25rem);
      }

      /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         FILTERS PANEL
         ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
      .filters-panel {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 16px;
        position: sticky;
        top: calc(var(--menu-height, 64px) + 16px);
      }

      .filter-cta {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        background: var(--color-primary);
        color: var(--color-white);
        border: none;
        border-radius: var(--radius-sm);
        padding: 12px 18px;
        font-size: 15px;
        font-weight: 600;
        font-family: var(--font-body);
        cursor: pointer;
        transition: background var(--transition);
      }

      .filter-cta:hover {
        background: var(--color-primary-dark);
      }

      .filter-cta svg {
        width: 18px;
        height: 18px;
      }

      .filter-card {
        background: var(--color-white);
        border-radius: var(--radius-md);
        border: 1px solid var(--color-border);
        box-shadow: var(--card-shadow);
        padding: 18px 18px 22px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        transition: box-shadow var(--transition);
      }

      .filter-card:hover {
        box-shadow: var(--card-shadow-hover);
      }

      .filter-title {
        font-family: var(--font-heading);
        font-size: 15px;
        font-weight: 700;
        color: var(--color-text);
        text-align: left;
        padding-bottom: 10px;
        border-bottom: 2px solid var(--color-primary-light);
      }

      .filter-options {
        display: flex;
        flex-direction: column;
        gap: 10px;
        align-items: flex-start;
      }

      .filter-option {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 14px;
        font-weight: 500;
        color: var(--color-text);
        cursor: pointer;
        transition: color 0.2s ease;
      }

      .filter-option:hover {
        color: var(--color-primary);
      }

      .filter-option input[type="radio"],
      .filter-option input[type="checkbox"] {
        width: 18px;
        height: 18px;
        border: 1.5px solid var(--color-border);
        border-radius: 50%;
        appearance: none;
        background: var(--color-white);
        cursor: pointer;
        flex-shrink: 0;
        margin: 0;
        transition: background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      }

      .filter-option input[type="radio"]:checked,
      .filter-option input[type="checkbox"]:checked {
        background: var(--color-primary);
        border-color: var(--color-primary);
        box-shadow: inset 0 0 0 2.5px var(--color-white);
      }

      .filter-option input[type="radio"]:hover,
      .filter-option input[type="checkbox"]:hover {
        border-color: var(--color-primary);
      }

      /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         MOBILE ACTIONS
         ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
      .mobile-actions {
        display: none;
        align-items: center;
        gap: 10px;
      }

      .icon-button {
        width: 36px;
        height: 36px;
        border-radius: var(--radius-sm);
        border: 1px solid var(--color-border);
        background: var(--color-white);
        box-shadow: var(--card-shadow);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: var(--color-text);
        cursor: pointer;
        transition: box-shadow var(--transition), transform 0.15s ease;
      }

      .icon-button:hover {
        box-shadow: var(--card-shadow-hover);
        transform: translateY(-1px);
      }

      .icon-button svg {
        width: 18px;
        height: 18px;
        color: var(--color-primary);
      }

      .restart-toggle {
        position: relative;
      }

      .restart-popover {
        position: absolute;
        top: calc(100% + 10px);
        left: 0;
        min-width: 160px;
        background: var(--color-white);
        border-radius: var(--radius-md);
        border: 1px solid var(--color-border);
        box-shadow: 0 12px 32px rgba(10, 10, 26, 0.12);
        padding: 10px;
        display: none;
        z-index: 20;
      }

      .restart-popover.is-open {
        display: block;
      }

      .restart-confirm {
        width: 100%;
        border: none;
        border-radius: var(--radius-full);
        padding: 10px 16px;
        background: var(--color-primary);
        color: var(--color-white);
        font-size: 14px;
        font-weight: 600;
        font-family: var(--font-body);
        cursor: pointer;
        transition: background var(--transition);
      }

      .restart-confirm:hover {
        background: var(--color-primary-dark);
      }

      .filter-drawer-close {
        display: none;
        align-self: flex-end;
        width: 36px;
        height: 36px;
        border-radius: var(--radius-sm);
        border: 1px solid var(--color-border);
        background: var(--color-white);
        box-shadow: var(--card-shadow);
        cursor: pointer;
        align-items: center;
        justify-content: center;
        color: var(--color-primary);
        transition: box-shadow var(--transition);
      }

      .filter-drawer-close:hover {
        box-shadow: var(--card-shadow-hover);
      }

      .filter-drawer-close svg {
        width: 18px;
        height: 18px;
      }

      /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         SORT TOOLBAR
         ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
      .results-toolbar {
        position: absolute;
        right: clamp(20px, 4vw, 50px);
        bottom: 18px;
        display: flex;
        align-items: center;
      }

      .sort-control {
        display: inline-flex;
        align-items: center;
        gap: 9px;
        font-family: var(--font-body);
      }

      .sort-select {
        position: relative;
        display: inline-flex;
      }

      .sort-label {
        font-size: 14px;
        font-weight: 500;
        color: var(--color-text-secondary);
      }

      .sort-button {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        height: 34px;
        padding: 0 16px;
        border: 1px solid var(--color-border);
        border-radius: var(--radius-full);
        background: var(--color-white);
        color: var(--color-text);
        font-size: 14px;
        font-family: var(--font-body);
        font-weight: 500;
        line-height: 1.2;
        cursor: pointer;
        box-shadow: var(--card-shadow);
        transition: box-shadow var(--transition), border-color 0.2s ease;
      }

      .sort-button:hover {
        border-color: var(--color-primary);
        box-shadow: var(--card-shadow-hover);
      }

      .sort-button svg {
        width: 14px;
        height: 14px;
        color: var(--color-primary);
      }

      .sort-menu {
        position: absolute;
        left: 0;
        top: calc(100% + 6px);
        width: 100%;
        display: none;
        flex-direction: column;
        background: var(--color-white);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-sm);
        box-shadow: 0 12px 32px rgba(10, 10, 26, 0.1);
        z-index: 4;
        overflow: hidden;
      }

      .sort-control.is-open .sort-menu {
        display: flex;
      }

      .sort-option {
        border: none;
        background: transparent;
        text-align: left;
        padding: 8px 14px;
        font-family: var(--font-body);
        font-size: 14px;
        font-weight: 500;
        color: var(--color-text);
        cursor: pointer;
        transition: background 0.15s ease, color 0.15s ease;
      }

      .sort-option:hover {
        background: var(--color-primary-light);
        color: var(--color-primary);
      }

      .sort-option.is-selected {
        color: var(--color-primary);
        font-weight: 600;
      }

      /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         BEST MATCH CARD
         ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
      .best-match-card {
        width: 100%;
        max-width: var(--container-max);
        background: var(--color-white);
        border-radius: var(--radius-lg);
        border: 1px solid var(--color-border);
        display: flex;
        flex-direction: column;
        gap: 0;
        padding: 0 clamp(1.5rem, 7vw, 5rem) clamp(1.25rem, 4vw, 1.75rem);
        position: relative;
        box-shadow: var(--card-shadow);
        transition: transform 0.2s ease, opacity 0.2s ease, box-shadow var(--transition);
        overflow: hidden;
      }

      /* Accent top line */
      .best-match-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, var(--color-primary) 0%, #2d7dd2 100%);
      }

      .best-match-card.inline {
        width: 100%;
        max-width: var(--container-max);
        grid-column: 1 / -1;
        margin: 0 auto clamp(0.5rem, 2vw, 0.625rem);
      }

      .best-match-card.is-opening {
        transform: translateY(6px);
        opacity: 0.9;
      }

      .best-match-card.is-hidden {
        display: none;
      }

      .best-match-row {
        display: flex;
        flex-direction: column;
        gap: clamp(1.5rem, 4vw, 2.5rem);
        flex: 0 0 auto;
        align-items: center;
        margin-top: clamp(1.75rem, 5vw, 3rem);
      }

      .best-match-close {
        position: absolute;
        top: 14px;
        right: 14px;
        width: 32px;
        height: 32px;
        border: 1px solid var(--color-border);
        border-radius: 50%;
        background: var(--color-white);
        color: var(--color-text-secondary);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      }

      .best-match-close:hover {
        color: var(--color-primary);
        border-color: var(--color-primary);
        box-shadow: 0 2px 8px rgba(9, 84, 163, 0.12);
      }

      .best-match-close svg {
        width: 15px;
        height: 15px;
      }

      .best-match-media {
        width: 100%;
        max-width: clamp(14rem, 50vw, 26rem);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-top: clamp(0.5rem, 2vw, 0.75rem);
      }

      .best-match-media img {
        width: 100%;
        height: auto;
        max-width: 100%;
        object-fit: contain;
        display: block;
        filter: drop-shadow(0 12px 24px rgba(10, 10, 26, 0.08));
        transition: transform var(--transition);
      }

      .best-match-card:hover .best-match-media img {
        transform: scale(1.02);
      }

      .best-match-body {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 0;
      }

      .best-match-name {
        font-family: var(--font-heading);
        font-size: 22px;
        font-weight: 700;
        color: var(--color-text);
        letter-spacing: -0.01em;
        margin: 0;
      }

      .best-match-points {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 12px;
        font-size: 14px;
        color: var(--color-text-secondary);
        margin-top: 16px;
        max-width: 26.25rem;
      }

      .best-match-points li {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        line-height: 1.45;
      }

      .best-match-check {
        width: 17px;
        height: 17px;
        color: var(--color-primary);
        flex-shrink: 0;
        margin-top: 1px;
      }

      .best-match-specs {
        font-size: 13px;
        color: var(--color-text-secondary);
        margin-top: clamp(0.75rem, 3vw, 1.25rem);
        letter-spacing: 0.01em;
      }

      .best-match-price {
        font-family: var(--font-heading);
        font-size: 22px;
        font-weight: 700;
        color: var(--color-text);
        margin-top: clamp(0.75rem, 3vw, 1rem);
      }

      .best-match-footer {
        height: 0;
      }

      .best-match-divider {
        display: none;
      }

      /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         OTHER MATCHES
         ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
      .other-matches {
        width: 100%;
        display: flex;
        justify-content: center;
      }

      .other-matches-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: clamp(1rem, 3vw, 1.5rem);
        width: 100%;
        max-width: var(--container-max);
      }

      .other-match-card {
        width: 100%;
        background: var(--color-white);
        border-radius: var(--radius-md);
        border: 1.5px solid var(--color-border);
        padding: clamp(1.25rem, 3vw, 1.5rem);
        display: flex;
        flex-direction: column;
        gap: clamp(0.5rem, 1.5vw, 0.75rem);
        align-items: flex-start;
        text-align: left;
        box-shadow: var(--card-shadow);
        transition: box-shadow var(--transition),
                    transform var(--transition),
                    border-color var(--transition);
      }

      .other-match-card:hover {
        box-shadow: var(--card-shadow-hover);
        transform: translateY(-3px);
      }

      .other-match-card.is-active {
        border-color: var(--color-primary);
        box-shadow: 0 8px 28px rgba(9, 84, 163, 0.16), 0 0 0 3px rgba(9, 84, 163, 0.08);
        transform: translateY(-3px);
      }

      .other-match-card.is-active .other-match-title {
        color: var(--color-primary);
      }

      .other-match-title {
        font-family: var(--font-heading);
        font-size: 16px;
        line-height: 1.3;
        font-weight: 700;
        text-align: left;
        color: var(--color-text);
        letter-spacing: -0.01em;
        margin: 0;
        transition: color 0.2s ease;
      }

      .other-match-media {
        width: 100%;
        display: flex;
        justify-content: flex-start;
      }

      .other-match-media img {
        width: clamp(9rem, 50vw, 12rem);
        height: auto;
        max-width: 100%;
        object-fit: contain;
        display: block;
        filter: drop-shadow(0 8px 16px rgba(10, 10, 26, 0.06));
        transition: transform var(--transition);
      }

      .other-match-card:hover .other-match-media img {
        transform: scale(1.03);
      }

      .other-match-price {
        font-family: var(--font-heading);
        font-size: 16px;
        font-weight: 700;
        color: var(--color-text);
      }

      .other-match-specs {
        list-style: none;
        display: flex;
        flex-wrap: wrap;
        gap: 0.25rem 0.65rem;
        font-size: 12px;
        color: var(--color-text-secondary);
      }

      .other-match-specs li {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .other-match-specs li::after {
        content: "\2022";
        color: #c5c9d0;
        margin-left: 0.45rem;
      }

      .other-match-specs li:last-child::after {
        content: "";
        margin-left: 0;
      }

      .other-match-action {
        background: var(--color-primary);
        border: none;
        color: var(--color-white);
        font-size: 13px;
        font-weight: 600;
        font-family: var(--font-body);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 9px 24px;
        border-radius: var(--radius-full);
        cursor: pointer;
        margin-top: auto;
        align-self: center;
        transition: background var(--transition), transform 0.15s ease, box-shadow var(--transition);
        box-shadow: 0 2px 8px rgba(9, 84, 163, 0.15);
      }

      .other-match-action:hover {
        background: var(--color-primary-dark);
        transform: translateY(-1px);
        box-shadow: 0 4px 14px rgba(9, 84, 163, 0.25);
      }

      .other-match-action svg {
        width: 20px;
        height: 20px;
      }

      .no-matches {
        font-size: 14px;
        color: var(--color-text-secondary);
        text-align: center;
        padding: 40px 20px;
      }

      /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         ANIMATIONS
         ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
      @keyframes fadeLift {
        0% {
          opacity: 0;
          transform: translateY(14px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .best-match-card {
        animation: fadeLift 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      }

      .other-match-card {
        animation: fadeLift 0.45s cubic-bezier(0.16, 1, 0.3, 1);
      }

      /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         FOOTER OVERRIDE
         ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
      .landing-footer {
        background: #f1f3f8;
        border-top: 1px solid var(--color-border);
      }

      /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         RESPONSIVE — 1200px
         ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
      @media (max-width: 1200px) {
        .title-bar {
          height: auto;
          display: grid;
          grid-template-columns: 1fr auto;
          grid-template-rows: auto auto;
          align-items: center;
          gap: 0.5rem 1rem;
          padding: 0.85rem clamp(20px, 4vw, 40px) 1rem;
        }

        .restart-link,
        .results-toolbar {
          position: static;
        }

        .restart-link {
          grid-column: 1;
          grid-row: 1;
          justify-self: start;
        }

        .result-title {
          grid-column: 1 / -1;
          grid-row: 2;
          max-width: 36rem;
          line-height: 1.3;
          justify-self: center;
          margin-top: 0.25rem;
        }

        .results-toolbar {
          grid-column: 2;
          grid-row: 1;
          justify-self: end;
        }
      }

      /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         RESPONSIVE — 900px (best-match horizontal)
         ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
      @media (min-width: 900px) {
        .best-match-row {
          flex-direction: row-reverse;
          align-items: flex-start;
        }

        .other-match-media img {
          width: clamp(10rem, 18vw, 12rem);
        }
      }

      @media (max-width: 900px) {
        .title-bar {
          height: auto;
          display: grid;
          grid-template-columns: 1fr auto;
          grid-template-rows: auto auto;
          align-items: center;
          gap: 0.5rem 0.9rem;
          padding: 0.85rem 1.1rem 1rem;
        }

        .restart-link,
        .results-toolbar {
          position: static;
        }

        .restart-link {
          grid-column: 1;
          grid-row: 1;
          justify-self: start;
        }

        .result-title {
          grid-column: 1 / -1;
          grid-row: 2;
          max-width: 30rem;
          line-height: 1.3;
          justify-self: center;
          margin-top: 0.3rem;
        }

        .results-toolbar {
          grid-column: 2;
          grid-row: 1;
          justify-self: end;
        }

        .sort-button {
          height: 34px;
          padding: 0 14px;
          font-size: 13px;
        }
      }

      /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         RESPONSIVE — 700px (mobile drawer)
         ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
      @media (max-width: 700px) {
        .title-bar {
          height: auto;
          display: grid;
          grid-template-columns: 1fr auto;
          grid-template-rows: auto auto;
          align-items: center;
          gap: 0.6rem 0.9rem;
          padding: 0.75rem 1rem 0.9rem;
        }

        .mobile-actions {
          display: flex;
          grid-column: 1;
          grid-row: 1;
          justify-self: start;
        }

        .restart-link {
          display: none;
        }

        .results-toolbar {
          position: static;
          grid-column: 2;
          grid-row: 1;
          justify-self: end;
          margin: 0;
        }

        .result-title {
          grid-column: 1 / -1;
          grid-row: 2;
          margin-top: 0.3rem;
        }

        .results-section {
          padding-left: 16px;
          padding-right: 16px;
        }

        .results-layout {
          display: block;
          gap: 0;
        }

        /* Slide-in drawer */
        .filters-panel {
          position: fixed;
          top: var(--menu-height);
          left: 0;
          bottom: 0;
          width: min(80vw, 300px);
          background: var(--color-bg);
          padding: 20px 16px 32px;
          box-shadow: 10px 0 30px rgba(10, 10, 26, 0.12);
          transform: translateX(-105%);
          transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
          z-index: 900;
          overflow-y: auto;
          border-right: 1px solid var(--color-border);
        }

        .filters-panel.is-open {
          transform: translateX(0);
        }

        .filter-drawer-close {
          display: inline-flex;
        }

        .filter-cta {
          width: 100%;
          justify-content: flex-start;
        }

        /* Best match mobile */
        .best-match-card {
          padding: 1.25rem 1.1rem 1.5rem;
          border-radius: 20px;
        }

        .best-match-row,
        .best-match-body {
          align-items: center;
          text-align: center;
        }

        .best-match-media {
          max-width: 380px;
          margin-left: auto;
          margin-right: auto;
        }

        .best-match-name {
          font-size: clamp(1.1rem, 4vw, 1.25rem);
        }

        .best-match-price {
          font-size: clamp(1.25rem, 5vw, 1.5rem);
          text-align: center;
        }

        .best-match-points {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 0.5rem 0.75rem;
          max-width: 480px;
          text-align: left;
          margin-left: auto;
          margin-right: auto;
        }

        .best-match-points li {
          align-items: flex-start;
        }

        /* Other match cards mobile */
        .other-match-card {
          padding: 1rem 1.1rem 1rem;
          gap: 0.5rem;
        }

        .other-match-media img {
          width: clamp(9rem, 55vw, 11rem);
        }

        .other-match-action {
          width: min(70%, 200px);
        }
      }

      /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         RESPONSIVE — 520px
         ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
      @media (max-width: 520px) {
        .result-title {
          gap: 0.4rem;
          max-width: 19rem;
          font-size: clamp(18px, 5vw, 22px);
        }

        .best-match-points {
          grid-template-columns: 1fr;
          max-width: 300px;
        }

        .other-matches-grid {
          grid-template-columns: 1fr;
        }

        .sort-label {
          display: none;
        }

        .other-match-media img {
          width: clamp(8rem, 60vw, 10rem);
        }
      }

      /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         RESPONSIVE — 400px
         ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
      @media (max-width: 400px) {
        .title-bar {
          padding: 0.6rem 0.8rem 0.85rem;
        }

        .best-match-name {
          font-size: 1rem;
        }

        .best-match-price {
          font-size: 1.25rem;
        }

        .other-match-title {
          font-size: 1rem;
        }

        .other-match-card {
          border-radius: var(--radius-md);
        }

        .best-match-card {
          padding: 1rem 0.9rem 1.25rem;
        }
      }
    </style>
  </head>

  <body>
    <!-- ════════════════════════════════════════════
         TITLE BAR
         ════════════════════════════════════════════ -->
    <div class="title-bar">
      <div class="mobile-actions" aria-label="Snelle acties">
        <button
          class="icon-button filter-toggle"
          type="button"
          aria-label="Open filters"
          aria-expanded="false"
          aria-controls="filtersPanel"
        >
          <i data-lucide="funnel"></i>
        </button>
        <div class="restart-toggle">
          <button
            class="icon-button restart-trigger"
            type="button"
            aria-label="Begin opnieuw"
            aria-expanded="false"
            aria-controls="restartPopover"
          >
            <i data-lucide="rotate-ccw"></i>
          </button>
          <div
            id="restartPopover"
            class="restart-popover"
            role="dialog"
            aria-hidden="true"
          >
            <button class="restart-confirm" type="button">
              Begin opnieuw
            </button>
          </div>
        </div>
      </div>

      <a class="restart-link" href="vragen.html">
        <span>Begin opnieuw</span>
        <i data-lucide="rotate-ccw"></i>
      </a>

      <h1 id="resultTitle" class="result-title">
        <span id="resultTitleText"
          >De tv die het beste bij je keuzes past!</span
        >
        <span id="resultMatchCount" class="result-count">(0)</span>
      </h1>

      <div class="results-toolbar">
        <div id="sortControl" class="sort-control">
          <span class="sort-label">Sorteer op:</span>
          <div class="sort-select">
            <button
              id="sortButton"
              class="sort-button"
              type="button"
              aria-haspopup="listbox"
              aria-expanded="false"
            >
              <span id="sortButtonText">Prijs (laag-hoog)</span>
              <i data-lucide="arrow-up-down"></i>
            </button>
            <div
              id="sortMenu"
              class="sort-menu"
              role="listbox"
              aria-hidden="true"
            >
              <button
                class="sort-option is-selected"
                type="button"
                role="option"
                aria-selected="true"
                data-value="price-asc"
              >
                Prijs (laag-hoog)
              </button>
              <button
                class="sort-option"
                type="button"
                role="option"
                aria-selected="false"
                data-value="price-desc"
              >
                Prijs (hoog-laag)
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ════════════════════════════════════════════
         MAIN RESULTS
         ════════════════════════════════════════════ -->
    <main class="results-section">
      <div class="results-layout">
        <!-- Filters sidebar -->
        <aside
          id="filtersPanel"
          class="filters-panel"
          aria-label="Filters"
        >
          <button
            class="filter-drawer-close"
            type="button"
            aria-label="Sluit filters"
          >
            <i data-lucide="chevron-left"></i>
          </button>
          <button class="filter-cta" type="button">
            <i data-lucide="funnel"></i>
            <span>Extra filters:</span>
          </button>
          <div class="filter-card" data-filter="price">
            <h3 class="filter-title">Verander prijscategorie</h3>
            <div id="priceFilterOptions" class="filter-options"></div>
          </div>
          <div class="filter-card" data-filter="brand">
            <h3 class="filter-title">Kies een merk</h3>
            <div id="brandFilterOptions" class="filter-options"></div>
          </div>
        </aside>

        <!-- Results content -->
        <div class="results-content">
          <!-- Best match (expanded card) -->
          <section id="bestMatchCard" class="best-match-card">
            <button
              class="best-match-close"
              type="button"
              aria-label="Sluit"
            >
              <i data-lucide="x"></i>
            </button>
            <div class="best-match-row">
              <div class="best-match-media" aria-hidden="true">
                <img src="tv.png" alt="" role="presentation" />
              </div>
              <div class="best-match-body">
                <h2 id="bestMatchName" class="best-match-name"></h2>
                <ul id="bestMatchPoints" class="best-match-points"></ul>
                <div id="bestMatchSpecs" class="best-match-specs"></div>
                <div id="bestMatchPrice" class="best-match-price"></div>
              </div>
            </div>
            <div class="best-match-divider" aria-hidden="true"></div>
            <div class="best-match-footer"></div>
          </section>

          <!-- Grid of other matches -->
          <section class="other-matches">
            <div id="otherMatchesGrid" class="other-matches-grid"></div>
          </section>
        </div>
      </div>
    </main>

    <!-- ═══ SCRIPTS ═══ -->
    <script src="result-ui.js" defer></script>
    <script type="module" src="result-filters.js"></script>
    <script type="module" src="main.js"></script>
  </body>
</html>
